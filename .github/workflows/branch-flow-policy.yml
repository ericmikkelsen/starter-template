name: Branch Flow Policy

on:
    pull_request:
        types: [opened, synchronize, reopened, edited, ready_for_review]

permissions:
    contents: read

jobs:
    branch-flow-policy:
        name: Validate story/chapter PR flow
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Test branch policy script
              run: bash .github/scripts/validate-branch-flow.test.sh

            - name: Validate branch policy
              env:
                  HEAD_REPO_FULL_NAME: ${{ github.event.pull_request.head.repo.full_name }}
                  BASE_REPO_FULL_NAME: ${{ github.event.pull_request.base.repo.full_name }}
              run: bash .github/scripts/validate-branch-flow.sh
