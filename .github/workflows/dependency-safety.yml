name: Dependency Safety

on:
    pull_request:
        branches: [main]
    push:
        branches: [main]

permissions:
    contents: read

jobs:
    dependency-safety:
        name: Validate dependency install
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: '22'
                  cache: 'npm'

            - name: Clean install
              run: npm ci

            - name: Validate lockfile consistency
              run: git diff --exit-code package-lock.json
