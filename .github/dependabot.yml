version: 2
updates:
    - package-ecosystem: npm
      directory: /
      target-branch: main
      schedule:
          interval: weekly
      open-pull-requests-limit: 3
      groups:
          npm-minor-patch:
              patterns:
                  - '*'
              update-types:
                  - minor
                  - patch
          npm-major:
              patterns:
                  - '*'
              update-types:
                  - major
      commit-message:
          prefix: 'chore'
          include: 'scope'
      labels:
          - dependencies

    - package-ecosystem: npm
      directory: /agent-skills-extension
      target-branch: main
      schedule:
          interval: weekly
      open-pull-requests-limit: 3
      groups:
          npm-minor-patch:
              patterns:
                  - '*'
              update-types:
                  - minor
                  - patch
          npm-major:
              patterns:
                  - '*'
              update-types:
                  - major
      commit-message:
          prefix: 'chore'
          include: 'scope'
      labels:
          - dependencies

    - package-ecosystem: github-actions
      directory: /
      target-branch: main
      schedule:
          interval: weekly
      open-pull-requests-limit: 3
      commit-message:
          prefix: 'chore'
          include: 'scope'
      labels:
          - dependencies
